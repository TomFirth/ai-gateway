version: "3.9"

services:
  ai-gateway:
    build:
      context: .
    ports:
      - "${PORT:-1234}:1234"
    env_file:
      - .env
    environment:
      CHROMA_URL: "http://chroma:2345"
      QDRANT_URL: "http://qdrant:6333"
      PGVECTOR_DATABASE_URL: "postgres://ai:ai_pass@postgres:5432/ai_gateway"
    depends_on:
      - chroma
      - qdrant
      - postgres
    restart: unless-stopped

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    platform: linux/arm64
    ports:
      - "2345:2345"
    command: ["run", "--host", "0.0.0.0", "--port", "2345", "--path", "/data"]
    volumes:
      - chroma_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    platform: linux/arm64
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15
    platform: linux/arm64
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai_pass
      POSTGRES_DB: ai_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  chroma_data:
  qdrant_data:
  postgres_data: